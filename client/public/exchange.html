<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange AxAShop</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d0d14; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
  html { scrollbar-color: #2a2a3a #0d0d14; scrollbar-width: thin; }

  body {
    background: #0d0d14;
    color: #eee;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(0,200,255,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 90%, rgba(160,80,255,0.07) 0%, transparent 55%);
  }

  .wrap { width: 100%; max-width: 520px; }

  h1 { text-align: center; font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .sub { text-align: center; font-family: 'Space Mono', monospace; font-size: 11px; color: #555; margin-bottom: 28px; letter-spacing: 1px; }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 10px;
  }

  /* FROM selector */
  .selector-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    margin-bottom: 20px;
  }

  .selector-grid.to-grid {
    margin-bottom: 24px;
  }

  .btn-sel {
    background: #16161f;
    border: 2px solid #222230;
    border-radius: 10px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    outline: none;
  }

  .btn-sel .sname {
    font-size: 10px;
    font-weight: 800;
    color: #aaa;
    display: block;
    line-height: 1.3;
  }

  .btn-sel:hover { transform: translateY(-2px); border-color: #444; }

  /* Active colors by method */
  .btn-sel.active { color: #fff; }
  .btn-sel[data-key="banque"].active      { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
  .btn-sel[data-key="paypal"].active      { border-color: #00b4ff; background: rgba(0,180,255,0.1); }
  .btn-sel[data-key="crypto"].active      { border-color: #f59e0b; background: rgba(245,158,11,0.1); }
  .btn-sel[data-key="paysafe"].active     { border-color: #ef4444; background: rgba(239,68,68,0.1); }
  .btn-sel[data-key="cartecadeau"].active { border-color: #22c55e; background: rgba(34,197,94,0.1); }

  .btn-sel[data-key="banque"].active .sname      { color: #93c5fd; }
  .btn-sel[data-key="paypal"].active .sname      { color: #5cd4ff; }
  .btn-sel[data-key="crypto"].active .sname      { color: #fcd34d; }
  .btn-sel[data-key="paysafe"].active .sname     { color: #fca5a5; }
  .btn-sel[data-key="cartecadeau"].active .sname { color: #86efac; }

  /* Arrow */
  .arrow-row {
    text-align: center;
    font-size: 22px;
    margin: -8px 0 8px;
    color: #333;
  }

  /* Input */
  .field {
    background: #16161f;
    border: 1px solid #222230;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 18px;
  }

  .field label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    display: block;
    margin-bottom: 10px;
  }

  .input-row { display: flex; align-items: center; gap: 10px; }

  input[type="number"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Space Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    -moz-appearance: textfield;
    width: 100%;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .curr-label { font-family: 'Space Mono', monospace; font-size: 18px; color: #444; }

  /* Result */
  .result-card {
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
    border: 1px solid #333;
    background: #16161f;
    transition: all 0.25s;
  }

  .r-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 8px;
  }

  .r-val {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: #00ff88;
    letter-spacing: -1px;
  }

  .r-val .r-curr { font-size: 16px; opacity: 0.5; margin-left: 4px; }
  .r-detail { margin-top: 6px; font-size: 12px; font-family: 'Space Mono', monospace; color: #555; }

  /* Fee badge */
  .fee-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
  }

  .fee-low    { color: #22c55e; border-color: rgba(34,197,94,0.3); }
  .fee-mid    { color: #f59e0b; border-color: rgba(245,158,11,0.3); }
  .fee-high   { color: #fb3c3c; border-color: rgba(251,146,60,0.3); }
  .fee-zero   { color: #888; border-color: #333; }

  /* Breakdown */
  .breakdown { display: flex; gap: 10px; margin-bottom: 20px; }
  .bk-item { flex: 1; background: #16161f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 12px; text-align: center; }
  .bk-item .bk-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #444; margin-bottom: 4px; }
  .bk-item .bk-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: #888; }

  /* Mini matrix */
  .matrix-toggle {
    text-align: center;
    margin-bottom: 12px;
  }

  .matrix-toggle button {
    background: none;
    border: 1px solid #333;
    border-radius: 8px;
    color: #555;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .matrix-toggle button:hover { border-color: #555; color: #aaa; }

  .matrix-wrap {
    display: none;
    overflow-x: auto;
    margin-bottom: 20px;
  }

  .matrix-wrap.show { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  th {
    background: #16161f;
    color: #666;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 6px;
    border: 1px solid #1e1e2e;
    white-space: nowrap;
  }

  td {
    padding: 7px 6px;
    border: 1px solid #1a1a28;
    text-align: center;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.1s;
  }

  td:first-child { color: #666; font-size: 9px; text-transform: uppercase; cursor: default; background: #16161f; }

  td.pct-green  { color: #4ade80; background: rgba(34,197,94,0.06); }
  td.pct-yellow { color: #fbbf24; background: rgba(245,158,11,0.06); }
  td.pct-orange { color: #fb923c; background: rgba(251,146,60,0.06); }
  td.pct-red    { color: #f87171; background: rgba(239,68,68,0.06); }
  td.pct-gray   { color: #555; background: #111; cursor: default; }

  td:not(:first-child):not(.pct-gray):hover { filter: brightness(1.3); }
  td.selected-cell { outline: 2px solid #fff; outline-offset: -2px; }

  @keyframes pop { 0% { transform: scale(0.97); opacity:0.5; } 100% { transform: scale(1); opacity:1; } }
  .animate { animation: pop 0.2s ease; }
</style>
</head>
<body>
<div class="wrap">
  <h1>💸 Exchange AxAShop</h1>
  <p class="sub">// Sélectionne DE → VERS · entre le montant</p>

  <!-- FROM -->
  <div class="section-title">De (source)</div>
  <div class="selector-grid" id="fromGrid">
    <button class="btn-sel active" data-key="banque"      onclick="selectFrom(this)"><span class="sname">Banque</span></button>
    <button class="btn-sel"        data-key="paypal"      onclick="selectFrom(this)"><span class="sname">PayPal</span></button>
    <button class="btn-sel"        data-key="crypto"      onclick="selectFrom(this)"><span class="sname">Crypto</span></button>
    <button class="btn-sel"        data-key="paysafe"     onclick="selectFrom(this)"><span class="sname">Paysafe Card</span></button>
    <button class="btn-sel"        data-key="cartecadeau" onclick="selectFrom(this)"><span class="sname">Carte Cadeau</span></button>
  </div>

  <div class="arrow-row">↓</div>

  <!-- TO -->
  <div class="section-title">Vers (destination)</div>
  <div class="selector-grid to-grid" id="toGrid">
    <button class="btn-sel"        data-key="banque"      onclick="selectTo(this)"><span class="sname">Banque</span></button>
    <button class="btn-sel active" data-key="paypal"      onclick="selectTo(this)"><span class="sname">PayPal</span></button>
    <button class="btn-sel"        data-key="crypto"      onclick="selectTo(this)"><span class="sname">Crypto</span></button>
    <button class="btn-sel"        data-key="paysafe"     onclick="selectTo(this)"><span class="sname">Paysafe Card</span></button>
    <button class="btn-sel"        data-key="cartecadeau" onclick="selectTo(this)"><span class="sname">Carte Cadeau</span></button>
  </div>

  <!-- Amount -->
  <div class="field">
    <label>Montant que tu veux exchange</label>
    <div class="input-row">
      <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" oninput="calc()">
      <span class="curr-label">€</span>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="r-label" id="resLabel">Tu vas envoyer (frais inclus)</div>
    <div class="r-val" id="resVal">—<span class="r-curr">€</span></div>
    <div class="r-detail" id="resDetail"></div>
    <div class="fee-badge fee-zero" id="feeBadge">Frais : —</div>
  </div>

  <div class="breakdown">
    <div class="bk-item"><div class="bk-label">Frais prélevés</div><div class="bk-val" id="bkFee">—</div></div>
    <div class="bk-item"><div class="bk-label">Tu reçois</div><div class="bk-val" id="bkReceive">—</div></div>
  </div>

  <!-- Matrix toggle -->
  <div class="matrix-toggle">
    <button onclick="toggleMatrix()">📊 Voir le tableau des frais</button>
  </div>

  <div class="matrix-wrap" id="matrixWrap">
    <table id="feeTable"></table>
  </div>
</div>

<script>
  // Fee matrix [FROM][TO] — null = same method (N/A)
  const KEYS  = ['banque', 'paypal', 'crypto', 'paysafe', 'cartecadeau'];
  const NAMES = { banque: 'Banque', paypal: 'PayPal', crypto: 'Crypto', paysafe: 'PaysafeCard', cartecadeau: 'Carte Cadeau' };

  const FEES = {
    banque:      { banque: null, paypal: 5.00, crypto: 5.00, paysafe: 5.00, cartecadeau: 4.00 },
    paypal:      { banque: 4.00, paypal: null, crypto: 5.00, paysafe: 4.50, cartecadeau: 4.50 },
    crypto:      { banque: 5.00, paypal: 5.00, crypto: null, paysafe: 4.50, cartecadeau: 6.50 },
    paysafe:     { banque: 6.00, paypal: 6.50, crypto: 10.00, paysafe: null, cartecadeau: 5.50 },
    cartecadeau: { banque: 6.50, paypal: 7.00, crypto: 8.00, paysafe: 6.50, cartecadeau: null }
  };

  let fromKey = 'banque';
  let toKey   = 'paypal';

  function selectFrom(btn) {
    document.querySelectorAll('#fromGrid .btn-sel').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fromKey = btn.dataset.key;
    calc();
    buildMatrix();
  }

  function selectTo(btn) {
    document.querySelectorAll('#toGrid .btn-sel').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    toKey = btn.dataset.key;
    calc();
    buildMatrix();
  }

  function getFee() {
    if (fromKey === toKey) return null;
    return FEES[fromKey][toKey];
  }

function feeClass(pct) {
  if (pct === null) return 'pct-gray';
  if (pct <= 5)  return 'pct-green';
  if (pct <= 7)  return 'pct-yellow';
  if (pct <= 8)  return 'pct-orange';
  return 'pct-red';
}

function badgeClass(pct) {
  if (pct === 0) return 'fee-zero';
  if (pct <= 5)  return 'fee-low';
  if (pct <= 7)  return 'fee-mid';
  if (pct <= 8)  return 'fee-mid';
  return 'fee-high';
}

  function calc() {
    const amount = parseFloat(document.getElementById('amount').value);
    const fee = getFee();
    const card = document.getElementById('resultCard');
    const resLabel = document.getElementById('resLabel');
    const resVal = document.getElementById('resVal');
    const resDetail = document.getElementById('resDetail');
    const feeBadge = document.getElementById('feeBadge');
    const bkFee = document.getElementById('bkFee');
    const bkReceive = document.getElementById('bkReceive');

    if (fee === null) {
      resLabel.textContent = '⚠️ Même méthode sélectionnée';
      resVal.innerHTML = '—<span class="r-curr">€</span>';
      resDetail.textContent = 'Choisis deux méthodes différentes.';
      feeBadge.textContent = 'Frais : N/A';
      feeBadge.className = 'fee-badge fee-zero';
      bkFee.textContent = '—';
      bkReceive.textContent = '—';
      return;
    }

    resLabel.textContent = `Tu vas envoyer (frais inclus) (${NAMES[fromKey]} → ${NAMES[toKey]})`;
    feeBadge.textContent = `Frais : ${fee.toFixed(2)}%`;
    feeBadge.className = `fee-badge ${badgeClass(fee)}`;

    if (!amount || amount <= 0) {
      resVal.innerHTML = '—<span class="r-curr">€</span>';
      resDetail.textContent = '';
      bkFee.textContent = '—';
      bkReceive.textContent = '—';
      return;
    }

    const toSend = fee === 0 ? amount : amount / (1 - fee / 100);
    const feeTaken = toSend - amount;

    resVal.innerHTML = `${toSend.toFixed(2).replace('.', ',')}<span class="r-curr">€</span>`;
    resDetail.textContent = fee === 0
      ? '✅ Aucun frais'
      : `${amount.toFixed(2).replace('.', ',')} ÷ ${(1 - fee/100).toFixed(4)} = ${toSend.toFixed(2).replace('.', ',')} €`;

    bkFee.textContent     = feeTaken.toFixed(2).replace('.', ',') + ' €';
    bkReceive.textContent = amount.toFixed(2).replace('.', ',') + ' €';

    card.classList.remove('animate');
    void card.offsetWidth;
    card.classList.add('animate');
  }

  function buildMatrix() {
    const tbl = document.getElementById('feeTable');
    let html = '<tr><th>De \\ Vers</th>';
    KEYS.forEach(k => { html += `<th>${NAMES[k]}</th>`; });
    html += '</tr>';

    KEYS.forEach(from => {
      html += `<tr><td>${NAMES[from]}</td>`;
      KEYS.forEach(to => {
        const fee = FEES[from][to];
        if (fee === null) {
          html += `<td class="pct-gray">—</td>`;
        } else {
          const cls = feeClass(fee);
          const sel = (from === fromKey && to === toKey) ? ' selected-cell' : '';
          html += `<td class="${cls}${sel}" onclick="quickSelect('${from}','${to}')">${fee.toFixed(2)}%</td>`;
        }
      });
      html += '</tr>';
    });

    tbl.innerHTML = html;
  }

  function quickSelect(from, to) {
    // Update from
    document.querySelectorAll('#fromGrid .btn-sel').forEach(b => {
      b.classList.toggle('active', b.dataset.key === from);
    });
    document.querySelectorAll('#toGrid .btn-sel').forEach(b => {
      b.classList.toggle('active', b.dataset.key === to);
    });
    fromKey = from;
    toKey   = to;
    calc();
    buildMatrix();
  }

  function toggleMatrix() {
    const wrap = document.getElementById('matrixWrap');
    wrap.classList.toggle('show');
    if (wrap.classList.contains('show')) buildMatrix();
  }

  // Init
  calc();
</script>
</body>
</html>
